name: CI Python Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonando el código
      uses: actions/checkout@v4

    - name: 2. Configurando Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' # Mejora la velocidad de ejecución significativamente

    - name: 3. Instalando dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest flake8

    - name: 4. Corriendo pruebas (pytest)
      run: pytest

    - name: 5. Corriendo linter (flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 6. Construyendo la imagen Docker (si todo lo anterior pasó)
      run: echo "Aquí iría el comando para construir tu imagen Docker, por ejemplo: docker build -t tu-imagen:$(git rev-parse --short HEAD) ."